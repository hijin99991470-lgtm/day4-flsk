<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>게시글 목록</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#FAF9F6] text-stone-800">
    <main class="max-w-3xl mx-auto px-5 py-10">
      <header class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-semibold tracking-tight">게시글 목록</h1>
        <a href="{{ url_for('post_create') }}" class="px-4 py-2 rounded-xl bg-amber-700 text-white">글쓰기</a>
      </header>

      <section class="space-y-4">
        {% if posts %}
          {% for post in posts %}
            <article class="bg-white rounded-xl border border-stone-200 p-5">
              <a href="{{ url_for('post_detail', post_id=post['id']) }}" class="block">
                <h2 class="text-xl font-semibold mb-2">{{ post['title'] }}</h2>
                <p class="text-stone-600 line-clamp-2">{{ post['content'] }}</p>
                <p class="text-sm text-stone-400 mt-3">{{ post['created_at'] }}</p>
              </a>
            </article>
          {% endfor %}
        {% else %}
          <p class="text-stone-500">아직 게시글이 없습니다.</p>
        {% endif %}
      </section>
    </main>
  </body>
</html>
