<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if mode == 'edit' %}글수정{% else %}글쓰기{% endif %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="text-stone-800 min-h-screen" style="background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 15%, #e8f5e9 35%, #c8e6c9 50%, #fff3e0 70%, #f3e5f5 85%, #e1bee7 100%);">
    <div class="min-h-screen" style="background-image: radial-gradient(circle at 20% 30%, rgba(244,143,177,0.4) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(206,147,216,0.3) 0%, transparent 40%), radial-gradient(circle at 60% 70%, rgba(165,214,167,0.4) 0%, transparent 45%), radial-gradient(circle at 10% 80%, rgba(255,183,77,0.3) 0%, transparent 40%), radial-gradient(circle at 90% 60%, rgba(129,212,250,0.3) 0%, transparent 35%);">
    <main class="max-w-2xl mx-auto px-5 py-10">
      <header class="mb-8">
        <h1 class="text-3xl font-semibold tracking-tight">{% if mode == 'edit' %}글수정{% else %}글쓰기{% endif %}</h1>
      </header>

      <form method="post" class="space-y-4 bg-white/90 backdrop-blur border border-stone-200 rounded-xl p-5">
        <div>
          <label for="title" class="block text-sm font-medium mb-2">제목</label>
          <input id="title" name="title" required value="{{ post['title'] if post else '' }}" class="w-full rounded-lg border-stone-300" />
        </div>

        <div>
          <label for="content" class="block text-sm font-medium mb-2">내용</label>
          <textarea id="content" name="content" required rows="10" class="w-full rounded-lg border-stone-300">{{ post['content'] if post else '' }}</textarea>
        </div>

        <div class="flex gap-3">
          <button type="submit" class="px-4 py-2 rounded-xl bg-amber-700 text-white">{% if mode == 'edit' %}수정{% else %}저장{% endif %}</button>
          <a href="{% if post %}{{ url_for('post_detail', post_id=post['id']) }}{% else %}{{ url_for('post_list') }}{% endif %}" class="px-4 py-2 rounded-xl border border-stone-300">취소</a>
        </div>
      </form>
    </main>
    </div>
  </body>
</html>
