<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ post['title'] }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="text-stone-800 min-h-screen" style="background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 15%, #e8f5e9 35%, #c8e6c9 50%, #fff3e0 70%, #f3e5f5 85%, #e1bee7 100%);">
    <div class="min-h-screen" style="background-image: radial-gradient(circle at 20% 30%, rgba(244,143,177,0.4) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(206,147,216,0.3) 0%, transparent 40%), radial-gradient(circle at 60% 70%, rgba(165,214,167,0.4) 0%, transparent 45%), radial-gradient(circle at 10% 80%, rgba(255,183,77,0.3) 0%, transparent 40%), radial-gradient(circle at 90% 60%, rgba(129,212,250,0.3) 0%, transparent 35%);">
    <main class="max-w-3xl mx-auto px-5 py-10">
      <a href="{{ url_for('post_list') }}" class="text-sm text-amber-700">← 목록으로</a>

      <article class="mt-4 bg-white rounded-xl border border-stone-200 p-6">
        <h1 class="text-3xl font-semibold tracking-tight mb-3">{{ post['title'] }}</h1>
        <p class="text-sm text-stone-400 mb-6">{{ post['created_at'] }}</p>
        <div class="text-stone-700 whitespace-pre-wrap leading-7">{{ post['content'] }}</div>

        <div class="mt-6 flex gap-3">
          <a href="{{ url_for('post_edit', post_id=post['id']) }}" class="px-4 py-2 rounded-xl border border-stone-300">수정</a>
          <form method="post" action="{{ url_for('post_delete', post_id=post['id']) }}" onsubmit="return confirm('정말 삭제할까요?')">
            <button type="submit" class="px-4 py-2 rounded-xl bg-red-600 text-white">삭제</button>
          </form>
        </div>
      </article>
    </main>
    </div>
  </body>
</html>
