<style>

      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

<body class="font-body-md text-on-surface antialiased bg-[#FAF9F6] min-h-screen flex flex-col">

<header class="fixed top-0 left-0 w-full z-50 bg-[#FAF9F6] dark:bg-stone-950 border-b border-stone-200/50 dark:border-stone-800/50 shadow-sm shadow-stone-200/20">
<div class="flex justify-between items-center w-full px-5 py-4 max-w-screen-xl mx-auto">
<div class="flex items-center gap-3">
<div class="p-2 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:scale-95 duration-200 rounded-lg">
<span class="material-symbols-outlined text-stone-800 dark:text-stone-100" data-icon="menu_book">menu_book</span>
</div>
<h1 class="text-2xl font-semibold text-stone-800 dark:text-stone-100 tracking-tighter font-inter">Lume</h1>
</div>
<div class="w-10 h-10 rounded-full bg-primary-container overflow-hidden active:scale-95 duration-200 cursor-pointer">

</div>
</div>
</header>
<main class="flex-grow pt-24 pb-24 px-container-padding max-w-screen-md mx-auto w-full">
<!-- Hero/Category Section -->
<section class="mb-section-margin">
<div class="flex flex-col gap-2">
<h2 class="font-h1 text-h1 text-on-surface">블로그</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[80%]">일상의 기록과 생각들을 담는 공간입니다.</p>
</div>
<div class="flex gap-2 mt-6 overflow-x-auto pb-2 scrollbar-hide">
<span class="bg-primary-container text-on-primary-container px-4 py-1.5 rounded-full font-label-sm text-label-sm whitespace-nowrap">전체 글</span>
<span class="bg-surface-container text-on-surface-variant px-4 py-1.5 rounded-full font-label-sm text-label-sm whitespace-nowrap">미니멀리즘</span>
<span class="bg-surface-container text-on-surface-variant px-4 py-1.5 rounded-full font-label-sm text-label-sm whitespace-nowrap">철학</span>
<span class="bg-surface-container text-on-surface-variant px-4 py-1.5 rounded-full font-label-sm text-label-sm whitespace-nowrap">독서</span>
</div>
</section>
<!-- Blog Posts Feed -->
<div class="flex flex-col gap-6">
<!-- Featured Item - Asymmetric Layout -->
<article class="group cursor-pointer">
<div class="relative w-full aspect-[16/9] rounded-xl overflow-hidden mb-4 soft-shadow">

<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<div class="flex flex-col gap-1 px-1">
<div class="flex items-center gap-2 text-primary">
<span class="font-label-sm text-label-sm uppercase tracking-widest">철학</span>
<span class="w-1 h-1 rounded-full bg-primary/40"></span>
<time class="font-label-sm text-label-sm text-on-surface-variant">2시간 전</time>
</div>
<h3 class="font-h2 text-h2 text-on-surface group-hover:text-primary transition-colors">의도적으로 살아가는 법</h3>
</div>
</article>
<!-- Grid of Secondary Posts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
<!-- Post 1 -->
<article class="bg-[#F5F5DC] p-5 rounded-xl soft-shadow flex flex-col justify-between min-h-[160px] group cursor-pointer active:scale-[0.98] transition-all">
<div>
<time class="font-label-sm text-label-sm text-on-surface-variant mb-2 block">5시간 전</time>
<h3 class="font-body-lg text-body-lg font-semibold text-on-surface leading-snug">새벽의 평온함 속에서 찾는 아침 의식</h3>
</div>
<div class="flex justify-between items-center mt-4">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">라이프스타일</span>
<span class="material-symbols-outlined text-primary/60 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</div>
</article>
<!-- Post 2 -->
<article class="bg-[#F5F5DC] p-5 rounded-xl soft-shadow flex flex-col justify-between min-h-[160px] group cursor-pointer active:scale-[0.98] transition-all">
<div>
<time class="font-label-sm text-label-sm text-on-surface-variant mb-2 block">어제</time>
<h3 class="font-body-lg text-body-lg font-semibold text-on-surface leading-snug">집중력을 높여주는 나만의 디지털 서재</h3>
</div>
<div class="flex justify-between items-center mt-4">
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">생산성</span>
<span class="material-symbols-outlined text-primary/60 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</div>
</article>
<!-- Post 3 -->
<article class="bg-[#F5F5DC] p-5 rounded-xl soft-shadow flex flex-col justify-between min-h-[160px] group cursor-pointer active:scale-[0.98] transition-all">

<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">문화</span>
<span class="material-symbols-outlined text-primary/60 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</div>
</article>
<!-- Post 4 -->
<article class="bg-[#F5F5DC] p-5 rounded-xl soft-shadow flex flex-col justify-between min-h-[160px] group cursor-pointer active:scale-[0.98] transition-all">

<h3 class="font-body-lg text-body-lg font-semibold text-on-surface leading-snug">비 오는 오후의 뜻밖의 즐거움</h3>

<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider">에세이</span>
<span class="material-symbols-outlined text-primary/60 group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</div>
</article>
</div>
</div>
</main>
<!-- FAB - Contextual for Writing -->
<button class="fixed bottom-24 right-6 w-14 h-14 bg-primary text-on-primary rounded-2xl shadow-xl flex items-center justify-center hover:shadow-2xl transition-all active:scale-90 z-40">
<span class="material-symbols-outlined text-3xl" data-icon="edit_note">edit_note</span>
</button>

<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#FAF9F6]/90 dark:bg-stone-950/90 backdrop-blur-md border-t border-stone-200/60 dark:border-stone-800/60 shadow-[0_-4px_12px_rgba(210,180,140,0.05)]">
<div class="flex justify-around items-center px-6 py-3 pb-safe max-w-screen-xl mx-auto">
<!-- Home Active Tab -->
<a class="flex flex-col items-center justify-center text-amber-800 dark:text-amber-200 bg-amber-100/50 dark:bg-amber-900/20 rounded-xl px-4 py-1.5 tap-highlight-transparent active:opacity-80 transition-all" href="#">
<span class="material-symbols-outlined mb-0.5" data-icon="home">home</span>
